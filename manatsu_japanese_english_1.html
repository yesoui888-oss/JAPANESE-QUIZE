.phone-overlay{position:absolute;inset:0;background:rgba(0,0,0,0.18);z-index:1;}
.screen{position:absolute;inset:0;display:flex;flex-direction:column;opacity:0;pointer-events:none;transition:opacity .3s;overflow:hidden;z-index:2;}
.screen.active{opacity:1;pointer-events:auto;}

/* HOME */
#home{position:relative;width:100%;height:100%;}
.home-top{position:absolute;top:0;left:0;right:0;padding:18px 26px 0;text-align:center;z-index:3;}
.home-bottom{position:absolute;bottom:0;left:0;right:0;padding:0 26px 20px;display:flex;flex-direction:column;align-items:center;gap:8px;z-index:3;}
.h-eyebrow{font-size:11px;letter-spacing:3px;color:#fff;text-transform:uppercase;text-shadow:0 1px 6px rgba(0,0,0,.7);}
.h-title{font-size:24px;font-weight:900;color:#fff;text-align:center;line-height:1.25;text-shadow:0 2px 12px rgba(0,0,0,.8);}
.h-sub{font-size:13px;color:#fff;font-weight:700;text-shadow:0 1px 6px rgba(0,0,0,.7);}
.dog-wrap{position:absolute;top:14px;right:14px;width:90px;height:90px;z-index:10;}
.dog-img{width:100%;height:100%;object-fit:contain;position:relative;z-index:1;animation:fl 4s ease-in-out infinite;filter:drop-shadow(0 4px 16px rgba(0,0,0,.35));}
@keyframes fl{0%,100%{transform:translateY(0) rotate(-2deg)}50%{transform:translateY(-10px) rotate(2deg)}}
.bubble{background:rgba(255,255,255,.92);border-radius:20px;padding:11px 16px;position:relative;box-shadow:0 5px 20px rgba(0,0,0,.35);max-width:260px;text-align:center;}
.bubble::before{content:'';position:absolute;top:-9px;left:50%;transform:translateX(-50%);border:9px solid transparent;border-bottom-color:rgba(255,255,255,.92);border-top:0;}
.bubble p{font-size:13px;color:#2C1810;line-height:1.65;font-weight:700;}
.bubble .jp{font-size:17px;font-family:'Noto Serif JP',serif;font-weight:700;color:var(--red);display:block;margin-top:3px;}
.menu{display:grid;grid-template-columns:1fr 1fr;gap:9px;width:100%;max-width:278px;}
.mbtn{background:rgba(0,0,0,.5);border:2px solid rgba(255,255,255,.35);border-radius:20px;padding:13px 10px;cursor:pointer;font-family:'Outfit',sans-serif;font-size:13px;font-weight:900;color:#fff;display:flex;flex-direction:column;align-items:center;gap:5px;transition:transform .15s;-webkit-tap-highlight-color:transparent;text-shadow:0 1px 4px rgba(0,0,0,.6);}
.mbtn:active{transform:scale(.93);}
.mbtn .mic{font-size:22px;}
.mbtn.prim{background:rgba(180,130,0,.75);border-color:rgba(255,220,50,.5);color:#fff;grid-column:span 2;font-size:15px;padding:15px;}

/* TOP BAR */
.tbar{display:flex;align-items:center;justify-content:space-between;padding:28px 18px 6px;z-index:5;flex-shrink:0;}
.bk{background:rgba(0,0,0,.5);border:1.5px solid rgba(255,255,255,.35);width:36px;height:36px;border-radius:12px;cursor:pointer;font-size:16px;color:#fff;display:flex;align-items:center;justify-content:center;-webkit-tap-highlight-color:transparent;}
.tbar-title{font-size:14px;font-weight:900;color:#fff;text-shadow:0 1px 6px rgba(0,0,0,.7);}

/* LESSON */
#lesson{}
.ldots{display:flex;gap:5px;}
.ldot{width:7px;height:7px;border-radius:4px;background:rgba(255,255,255,.35);transition:all .3s;}
.ldot.on{background:var(--yellow);width:20px;}
.ldot.done{background:var(--teal);}
.lbody{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:0 20px 14px;gap:12px;}
.lcard{background:rgba(0,0,0,.58);border:2px solid rgba(255,255,255,.25);border-radius:24px;padding:18px 16px;width:100%;text-align:center;position:relative;backdrop-filter:blur(8px);}
.le{font-size:32px;display:block;margin-bottom:6px;}
.lt{font-family:'Noto Serif JP',serif;font-size:34px;font-weight:700;color:#fff;display:block;text-shadow:0 0 22px rgba(255,220,50,.5);margin-bottom:4px;}
.lr{font-size:13px;color:rgba(255,255,255,.55);font-style:italic;display:block;margin-bottom:3px;}
.lj{font-size:18px;font-weight:900;color:var(--yellow);display:block;text-shadow:0 1px 6px rgba(0,0,0,.6);}
.spkbtn{position:absolute;top:10px;right:12px;background:rgba(0,0,0,.4);border:1.5px solid rgba(255,255,255,.3);border-radius:11px;width:35px;height:35px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:17px;-webkit-tap-highlight-color:transparent;}
.spkbtn.s,.qspk.s{animation:spkP .55s ease-in-out infinite alternate;}
@keyframes spkP{from{transform:scale(1)}to{transform:scale(1.18)}}
.lspeech{background:rgba(0,0,0,.55);border:1.5px solid rgba(255,255,255,.2);border-radius:16px;padding:10px 14px;font-size:13px;color:#fff;line-height:1.7;width:100%;text-align:center;font-weight:700;backdrop-filter:blur(6px);text-shadow:0 1px 4px rgba(0,0,0,.5);}
.nbtn{background:rgba(180,130,0,.8);border:2px solid rgba(255,220,50,.5);border-radius:20px;padding:13px 36px;font-family:'Outfit',sans-serif;font-size:15px;font-weight:900;color:#fff;cursor:pointer;-webkit-tap-highlight-color:transparent;text-shadow:0 1px 4px rgba(0,0,0,.5);}
.nbtn:active{transform:scale(.94);}

/* QUIZ */
#quiz{}
.qtop{display:flex;align-items:center;justify-content:space-between;padding:200px 18px 5px;flex-shrink:0;}
.sbadge{background:rgba(0,0,0,.6);border:2px solid var(--yellow);border-radius:18px;padding:6px 15px;font-size:14px;font-weight:900;color:var(--yellow);}
.cdwrap{position:relative;width:52px;height:52px;display:flex;align-items:center;justify-content:center;}
.cdsvg{position:absolute;inset:0;transform:rotate(-90deg);}
.cdt{fill:none;stroke:rgba(255,255,255,.2);stroke-width:3.5;}
.cdf{fill:none;stroke:var(--yellow);stroke-width:3.5;stroke-linecap:round;stroke-dasharray:125.6;stroke-dashoffset:0;transition:stroke .25s;}
.cdn{font-size:18px;font-weight:900;color:#fff;position:relative;z-index:1;}
.cdn.urg{color:#ff4466;}
.cdf.urg{stroke:#ff4466;}
.qprog{width:100%;height:4px;background:rgba(255,255,255,.15);flex-shrink:0;}
.qprogfill{height:100%;background:linear-gradient(90deg,var(--teal),var(--yellow));transition:width .3s ease;}
.qbody{flex:1;display:flex;flex-direction:column;align-items:center;padding:0 16px 8px;gap:6px;min-height:0;}
.qcard{background:rgba(0,0,0,.58);border:2px solid rgba(255,255,255,.25);border-radius:22px;padding:10px 14px;width:100%;text-align:center;position:relative;flex-shrink:0;backdrop-filter:blur(10px);}
.qhook{font-size:9px;font-weight:900;color:var(--yellow);letter-spacing:2px;text-transform:uppercase;display:block;margin-bottom:4px;}
.qthai{font-family:'Noto Serif JP',serif;font-size:30px;font-weight:700;color:#fff;display:block;text-shadow:0 0 24px rgba(255,220,50,.5);line-height:1.15;}
.qrow{display:flex;align-items:center;justify-content:center;gap:10px;margin:3px 0 2px;}
.qspk{background:rgba(0,0,0,.4);border:1.5px solid rgba(255,220,50,.4);border-radius:11px;padding:4px 12px;cursor:pointer;color:var(--yellow);font-family:'Outfit',sans-serif;font-size:12px;font-weight:900;display:flex;align-items:center;gap:4px;-webkit-tap-highlight-color:transparent;}
.qno{font-size:11px;color:rgba(255,255,255,.6);font-weight:700;}
.qhint{font-size:12px;color:rgba(255,255,255,.85);display:block;font-weight:700;text-shadow:0 1px 4px rgba(0,0,0,.6);}
.opts{display:grid;grid-template-columns:1fr 1fr;gap:8px;width:100%;flex-shrink:0;}
.opt{background:rgba(0,0,0,.52);border:2px solid rgba(255,255,255,.28);border-radius:18px;padding:9px 8px;cursor:pointer;font-family:'Outfit',sans-serif;font-weight:900;color:#fff;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;transition:all .18s;-webkit-tap-highlight-color:transparent;position:relative;overflow:hidden;backdrop-filter:blur(6px);text-align:center;}
.opt .oe{font-size:22px;}
.opt .ot{font-size:13px;font-weight:900;opacity:1;text-align:center;line-height:1.35;text-shadow:0 1px 4px rgba(0,0,0,.6);width:100%;}
.opt:active{transform:scale(.94);}
.opt.correct{background:rgba(78,205,196,.4);border-color:var(--teal);box-shadow:0 0 20px rgba(78,205,196,.5);}
.opt.correct::after{content:'';position:absolute;inset:0;background:radial-gradient(circle,rgba(78,205,196,.4) 0%,transparent 70%);animation:rpl .5s ease-out;}
@keyframes rpl{from{transform:scale(0);opacity:1}to{transform:scale(2.8);opacity:0}}
.opt.wrong{background:rgba(220,50,50,.4);border-color:#ff6666;}
.opt.reveal{background:rgba(78,205,196,.12);border-color:rgba(78,205,196,.3);opacity:.7;}
.fb{width:100%;border-radius:16px;padding:6px 14px;text-align:center;font-size:14px;font-weight:900;opacity:0;transition:opacity .28s;min-height:36px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.fb.show{opacity:1;}
.fb.ok{background:rgba(78,205,196,.35);color:#fff;border:2px solid rgba(78,205,196,.5);}
.fb.ng{background:rgba(220,50,50,.35);color:#fff;border:2px solid rgba(220,50,50,.5);}
.qnb{background:rgba(0,0,0,.6);border:2px solid var(--teal);border-radius:18px;padding:8px 36px;font-family:'Outfit',sans-serif;font-size:14px;font-weight:900;color:var(--teal);cursor:pointer;visibility:hidden;opacity:0;transition:opacity .22s;-webkit-tap-highlight-color:transparent;flex-shrink:0;}
.qnb.show{visibility:visible;opacity:1;}
.qnb:active{transform:scale(.94);}
.tmo{position:absolute;inset:0;background:rgba(180,0,0,.25);display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;z-index:20;border-radius:22px;backdrop-filter:blur(4px);}
.tmo.show{opacity:1;}
.tmo-t{font-size:24px;font-weight:900;color:#ffdd44;text-shadow:0 0 18px rgba(255,200,0,.8);animation:shk .3s ease;}
@keyframes shk{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}

/* RESULT */
#result{align-items:center;justify-content:center;padding:22px 28px;gap:8px;text-align:center;}
.rstars{font-size:34px;animation:stP .5s cubic-bezier(.17,.67,.28,1.4);}
@keyframes stP{from{transform:scale(0);opacity:0}to{transform:scale(1);opacity:1}}
.rdog{width:138px;height:138px;object-fit:contain;filter:drop-shadow(0 0 30px rgba(255,215,0,.5));animation:cel .5s ease infinite alternate;}
@keyframes cel{from{transform:rotate(-5deg) scale(1)}to{transform:rotate(5deg) scale(1.06)}}
.rtitle{font-size:24px;font-weight:900;color:#fff;text-shadow:0 2px 10px rgba(0,0,0,.7);}

 "またあとで", "hint": "Saying you will see someone later", "correct": "See you later", "options": ["Goodbye forever", "See you later", "Good morning", "Nice to meet you"], "emoji": ["👋", "⏰", "🌅", "🤝"]}];

var ord=[],li=0,qi=0,sc=0,ans=false;
var spkBtn=null,ttsOK=('speechSynthesis' in window);
var cdIv=null,cdL=10,CIRC=125.6;

var ac=null;
function gAC(){if(!ac)ac=new(window.AudioContext||window.webkitAudioContext)();return ac;}
function tone(f,d,t,v){try{var a=gAC(),o=a.createOscillator(),g=a.createGain();o.connect(g);g.connect(a.destination);o.type=t||'sine';o.frequency.value=f;g.gain.setValueAtTime(v||.3,a.currentTime);g.gain.exponentialRampToValueAtTime(.001,a.currentTime+d);o.start();o.stop(a.currentTime+d);}catch(e){}}
function sndTick(){tone(900,.07,'square',.11);}
function sndUrg(){tone(660,.09,'square',.21);}
function sndOK(){[523,659,784,1047].forEach(function(f,i){setTimeout(function(){tone(f,.22,'sine',.32);},i*95);});}
function sndNG(){tone(280,.14,'sawtooth',.27);setTimeout(function(){tone(200,.22,'sawtooth',.21);},140);}
function sndTO(){tone(440,.07,'square',.27);setTimeout(function(){tone(330,.07,'square',.27);},95);setTimeout(function(){tone(220,.28,'square',.27);},190);}

function getBestVoice(){
  var vs=speechSynthesis.getVoices();
  var preferred=['Kyoko','O-ren','Hattori','Google 日本語','Microsoft Haruka'];
  for(var p=0;p<preferred.length;p++){for(var i=0;i<vs.length;i++){if(vs[i].name.indexOf(preferred[p])!==-1&&(vs[i].lang==='ja-JP'||vs[i].lang.startsWith('ja'))){return vs[i];}}}
  for(var i=0;i<vs.length;i++){if(vs[i].lang==='ja-JP'||vs[i].lang.startsWith('ja')){return vs[i];}}
  return null;
}
function spk(txt,btn){
  if(!ttsOK)return;
  speechSynthesis.cancel();
  if(spkBtn)spkBtn.classList.remove('s');
  var u=new SpeechSynthesisUtterance(txt);
  u.lang='ja-JP';u.rate=0.75;u.pitch=1.0;u.volume=1.0;
  var bv=getBestVoice();if(bv)u.voice=bv;
  if(btn){btn.classList.add('s');spkBtn=btn;u.onend=u.onerror=function(){btn.classList.remove('s');spkBtn=null;};}
  speechSynthesis.speak(u);
}
function speakL(){spk(lessons[li].sp||lessons[li].thai||lessons[li].thaiSpeak,document.getElementById('spkL'));}
function speakQ(){spk(allQ[ord[qi]].thai,document.getElementById('spkQ'));}

function ss(id){
  stopCD();
  if(ttsOK)speechSynthesis.cancel();
  if(spkBtn){spkBtn.classList.remove('s');spkBtn=null;}
  document.querySelectorAll('.screen').forEach(function(s){s.classList.remove('active');});
  document.getElementById(id).classList.add('active');
}
function goHome(){ss('home');}

function startCD(){
  stopCD();cdL=10;updCD();
  cdIv=setInterval(function(){
    cdL--;
    if(cdL<=3)sndUrg();else sndTick();
    updCD();
    if(cdL<=0){stopCD();onTO();}
  },1000);
}
function stopCD(){if(cdIv){clearInterval(cdIv);cdIv=null;}}
function updCD(){
  var n=document.getElementById('cdn'),f=document.getElementById('cdf');
  if(!n||!f)return;
  n.textContent=cdL;
  f.style.strokeDashoffset=CIRC*(1-cdL/10);
  var u=cdL<=3;
  n.className='cdn'+(u?' urg':'');
  f.className='cdf'+(u?' urg':'');
}
function onTO(){
  if(ans)return;ans=true;sndTO();
  document.getElementById('tmo').className='tmo show';
  var q=allQ[ord[qi]];
  document.getElementById('og').querySelectorAll('.opt').forEach(function(b){
    b.classList.add(b.querySelector('.ot').textContent===q.correct?'correct':'reveal');
  });
  var fb=document.getElementById('fb');
  fb.className='fb ng show';
  fb.textContent="⏰ Times up！ Answer: "+q.correct+"";
  document.getElementById('qnb').className='qnb show';
}

function confetti(){
  var p=document.querySelector('.phone');
  var cols=['#FFD700','#FF69B4','#4ECDC4','#FF6B6B','#fff','#ffeeaa'];
  for(var i=0;i<42;i++){(function(i){setTimeout(function(){
    var el=document.createElement('div');el.className='cp';
    var sz=Math.random()*9+4;
    el.style.cssText='left:'+Math.random()*390+'px;top:-8px;width:'+sz+'px;height:'+sz+'px;background:'+cols[Math.floor(Math.random()*cols.length)]+';border-radius:'+(Math.random()>.5?'50%':'3px')+';animation-duration:'+(Math.random()*1.6+1)+'s;';
    p.appendChild(el);setTimeout(function(){el.remove();},3200);
  },i*38);})( i);}
}

function shuf(a){var b=a.slice();for(var i=b.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=b[i];b[i]=b[j];b[j]=t;}return b;}
function startQuiz(){qi=0;sc=0;ans=false;ord=shuf(Array.from({length:allQ.length},function(_,i){return i;}));ss('quiz');renderQ();}
function restartQ(){ord=shuf(Array.from({length:allQ.length},function(_,i){return i;}));qi=0;sc=0;ans=false;ss('quiz');renderQ();}

function renderQ(){
  ans=false;
  document.getElementById('tmo').className='tmo';
  var q=allQ[ord[qi]],tot=allQ.length;
  document.getElementById('qt').textContent=q.thai;
  document.getElementById('qh').textContent="Hint: "+q.hint;
  document.getElementById('qno').textContent=(qi+1)+'/'+tot;
  document.getElementById('sd').textContent=sc;
  document.getElementById('fb').className='fb';document.getElementById('fb').textContent='';
  document.getElementById('qnb').className='qnb';
  document.getElementById('qpf').style.width=((qi/tot)*100)+'%';
  var og=document.getElementById('og');og.innerHTML='';
  var pairs=[];
  for(var i=0;i<q.options.length;i++){pairs.push([q.options[i],q.emoji[i]]);}
  for(var i=pairs.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var tmp=pairs[i];pairs[i]=pairs[j];pairs[j]=tmp;}
  for(var i=0;i<pairs.length;i++){
    (function(op,em){
      var b=document.createElement('button');b.className='opt';
      b.innerHTML='<span class="oe">'+em+'</span><span class="ot">'+op+'</span>';
      b.addEventListener('click',function(){selA(op,b);});
      og.appendChild(b);
    })(pairs[i][0],pairs[i][1]);
  }
  if(ttsOK){if(speechSynthesis.speaking)speechSynthesis.cancel();setTimeout(function(){var q2=allQ[ord[qi]];spk(q2.thai,document.getElementById('spkQ'));},400);setTimeout(function(){startCD();},1300);}
  else setTimeout(function(){startCD();},380);
}

function selA(ch,btn){
  if(ans)return;ans=true;stopCD();
  var q=allQ[ord[qi]],ok=(ch===q.correct);
  document.getElementById('og').querySelectorAll('.opt').forEach(function(b){
    var lb=b.querySelector('.ot').textContent;
    if(lb===q.correct)b.classList.add('correct');
    else if(b===btn&&!ok)b.classList.add('wrong');
    else b.classList.add('reveal');
  });
  var fb=document.getElementById('fb');
  if(ok){sc++;sndOK();confetti();fb.className='fb ok show';fb.textContent="🎉 Correct！Manatsu is so happy！";}
  else{sndNG();fb.className='fb ng show';fb.textContent="💪 Almost！ Answer: "+q.correct+"";}
  document.getElementById('sd').textContent=sc;
  document.getElementById('qnb').className='qnb show';
}

function nextQ(){qi++;if(qi<allQ.length)renderQ();else showResult();}

function showResult(){
  ss('result');confetti();
    var tot=allQ.length,p=sc/tot,s,t,mm;
  if(p===1){s="⭐⭐⭐";t="Perfect！🎉";mm="All correct！ Incredible！<br>Manatsu is so proud of you 🐾";}
  else if(p>=.8){s="⭐⭐⭐";t="Awesome！🎊";mm="Over 80% correct！ Fantastic！<br>Manatsu gives you a big paw 🐾";}
  else if(p>=.6){s="⭐⭐";t="Well done！";mm="Getting there！ Keep it up！<br>Try again and beat your score 🐾";}
  else{s="⭐";t="Keep going！";mm="Review the lessons and try again！<br>Manatsu believes in you 🐾";}
  document.getElementById('rs').textContent=s;
  document.getElementById('rt').textContent=t;
  document.getElementById('rsc').textContent=sc+'/'+allQ.length;
  document.getElementById('rm').innerHTML=mm;
}

function startLesson(){li=0;ss('lesson');renderL();}
function renderL(){
  var l=lessons[li];
  document.getElementById('lE').textContent=l.emoji||'';
  document.getElementById('lT').textContent=l.thai||'';
  document.getElementById('lR').textContent=l.rom||l.romanji||'';
  document.getElementById('lJ').textContent=l.jp||l.japanese||'';
  document.getElementById('lS').innerHTML=(l.speech||l.tx||'').replace(/\n/g,'<br>');
  document.getElementById('lBtn').textContent=li<lessons.length-1?"Next →":"Start Quiz！🎯";
  var de=document.getElementById('ldots');de.innerHTML='';
  for(var i=0;i<lessons.length;i++){var d=document.createElement('div');d.className='ldot'+(i===li?' on':i<li?' done':'');de.appendChild(d);}
  if(ttsOK)setTimeout(function(){speakL();},600);
}
function nextL(){if(li<lessons.length-1){li++;renderL();}else startQuiz();}

if(ttsOK){
  speechSynthesis.getVoices();
  if(speechSynthesis.onvoiceschanged!==undefined){speechSynthesis.onvoiceschanged=function(){speechSynthesis.getVoices();};}
  document.addEventListener('touchstart',function(){var u=new SpeechSynthesisUtterance('');u.volume=0;speechSynthesis.speak(u);},{once:true});
}
</script>
